# NEGATIVE QUESTIONS — Flawed Email Writing questions (should be marked INVALID)

- vars:
    question_type: Email Writing
    bloom_level: Create
    difficulty: "B2-C1"
    marks: 8
    course_outcome: "Compose a formal email with clear purpose, appropriate tone, logical organization, and relevant details."
    error_type: "Inappropriate tone / informal structure"
    question: |
      Write an email in 120-150 words.

      Marks: 8

      You ordered a pair of headphones online, but you received the wrong model. Write an email to the customer support team requesting a replacement. Mention your order details, the issue, and the action you expect.
    sample_answer: |
      Subject: Wrong Product

      Hey,

      You people sent me the wrong headphones. I ordered a wireless model, but I got some basic wired one instead. This is really careless. Fix it fast and send the right one. My order number is ORD7812. I do not have time to keep calling your support team again and again.

      Also, tell your delivery people to be more careful next time. I expect this to be replaced immediately.

      Rahul
    explanation: "The response has the correct general purpose but uses an impolite and overly aggressive tone for a formal customer-support email. It also lacks a proper salutation and formal closing."
  assert:
    - type: llm-rubric
      value: >
        The validator is evaluating a FLAWED Email Writing question. Flaw:
        the email uses rude, aggressive language ("Hey", "You people", "This is really careless") with no formal salutation or sign-off, which is inappropriate for a formal customer-support email. The correct verdict is INVALID.
        Mark PASS if the output starts with INVALID. Mark FAIL if it starts with VALID.

