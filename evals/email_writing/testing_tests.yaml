      Your neighbourhood has been facing irregular garbage collection for three weeks. Write an email to the municipal officer complaining about the issue and requesting immediate action. Mention how it has affected residents.
    sample_answer: |
      Subject: Complaint About Garbage Collection

      Dear Sir/Madam,

      I am writing to complain about the irregular garbage collection in our neighbourhood for the past three weeks. Waste has been lying near the main road, causing a bad smell and attracting insects. Residents are worried about health problems, especially for children and elderly people.

      Last month, our streetlights were also not working, and many vehicles were parked carelessly near the market. The park needs repainting, and the community hall should be renovated soon. Please look into all these matters urgently.

      Yours faithfully,
      A resident
