        The validator is evaluating a FLAWED Email Writing question. Flaw:
        the email correctly opens with the garbage collection complaint but then drifts into unrelated topics (streetlights, parking, park repainting, hall renovation) never mentioned in the task, losing focus on the assigned issue. The correct verdict is INVALID.
        Mark PASS if the output starts with INVALID. Mark FAIL if it starts with VALID.

