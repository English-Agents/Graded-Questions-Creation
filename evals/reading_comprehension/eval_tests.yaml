# ── Passage 2: The History of Libraries ─────────────────────────────────────

- vars:
    question_type: MCQ
    bloom_level: Understand
    difficulty: Easy
    course_outcome: CO1
    passage: |
      The History of Libraries

      Libraries have played an important role in preserving and sharing knowledge throughout
      human history. Long before the invention of printing, ancient civilizations stored
      information on clay tablets, papyrus scrolls, and handwritten manuscripts. Some of
      the earliest known libraries existed in Mesopotamia and Egypt, where records of trade,
      laws, and literature were carefully maintained.

      One of the most famous libraries of the ancient world was the Library of Alexandria
      in Egypt. Established during the third century BCE, it aimed to collect all available
      knowledge from across the known world. Scholars traveled great distances to study its
      vast collection. Although much of the library was eventually lost due to a series of
      destructive events, its legacy continues to symbolize the pursuit of learning and
      intellectual exchange.

      The invention of the printing press in the fifteenth century transformed libraries
      dramatically. Books could be produced more quickly and at lower cost, making
      information accessible to a larger portion of society. Public libraries gradually
      emerged, offering citizens opportunities to read, learn, and conduct research
      regardless of their economic background.

      Modern libraries provide far more than books. Many now offer digital resources,
      including e-books, online journals, databases, and multimedia collections. Computers
      and internet access have become standard services in many library systems. Some
      libraries also host workshops, educational programs, and community events that
      encourage lifelong learning.

      Technology has further expanded the reach of libraries. Digital archives allow rare
      documents and historical records to be preserved and shared globally. Researchers can
      access materials from institutions located thousands of kilometres away. At the same
      time, librarians continue to play an essential role in helping people evaluate
      information critically and locate reliable sources.

      Despite the growth of online information, libraries remain valuable institutions.
      They provide quiet spaces for study, support academic research, and promote literacy
      within communities. By adapting to technological changes while preserving their
      educational mission, libraries continue to serve as gateways to knowledge for people
      of all ages.
    question: |
      What invention greatly increased access to books?

      a) The steam engine
      b) The compass
      c) The printing press
      d) The telescope
    answer_key: "c) The printing press"
    explanation: "The printing press allowed books to be produced more quickly and cheaply."
  assert:
    - type: llm-rubric
      value: >
        The validator is evaluating a correctly formed Reading Comprehension MCQ.
        The correct verdict is VALID — the answer is directly supported by the passage
        (which states the printing press transformed libraries by making books cheaper
        and faster to produce), there is exactly one correct option, and the question
        is passage-based.
        Mark PASS if the output starts with VALID. Mark FAIL if it starts with INVALID.

