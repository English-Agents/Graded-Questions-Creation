# ── Passage 3: Urban Transportation and Smart Cities ─────────────────────────

- vars:
    question_type: MCQ
    bloom_level: Understand
    difficulty: Moderate
    course_outcome: CO1
    passage: |
      Urban Transportation and Smart Cities

      As urban populations continue to grow, cities face increasing challenges related to
      transportation. Traffic congestion, air pollution, and long commuting times affect
      millions of people daily. To address these issues, many cities are adopting smart
      transportation systems that use technology to improve efficiency and sustainability.

      Smart transportation relies on data collected from sensors, cameras, and connected
      devices. Traffic management systems can analyze road conditions in real time and
      adjust traffic signals accordingly. This helps reduce delays and improve the flow of
      vehicles through busy intersections. Public transportation networks also benefit from
      technology, as passengers can receive real-time updates about schedules and route
      changes through mobile applications.

      Many cities are investing in environmentally friendly transportation options. Electric
      buses, bicycle-sharing programs, and dedicated cycling lanes encourage residents to
      choose alternatives to private vehicles. These initiatives can help reduce greenhouse
      gas emissions while promoting healthier lifestyles. Some urban areas have also
      introduced low-emission zones where highly polluting vehicles face restrictions or
      additional charges.

      Autonomous vehicles represent another area of innovation. These vehicles use sensors,
      cameras, and artificial intelligence to navigate roads with limited human intervention.
      Supporters argue that autonomous technology could improve road safety by reducing
      accidents caused by human error. However, challenges related to regulation,
      cybersecurity, and public acceptance must still be addressed before widespread
      adoption becomes possible.

      Smart cities often integrate transportation systems with broader urban planning
      strategies. Data collected from transportation networks can help city officials make
      informed decisions about infrastructure investments. For example, identifying areas
      with frequent congestion may guide the construction of additional public transit
      routes or road improvements.

      While technology offers significant opportunities, experts emphasize that
      transportation solutions must remain accessible and affordable. Successful smart city
      initiatives require cooperation among governments, businesses, and citizens. By
      combining technological innovation with sustainable planning, cities can create
      transportation systems that are more efficient, environmentally responsible, and
      responsive to the needs of their residents.
    question: |
      Why are electric buses and bicycle-sharing programs encouraged?

      a) To increase fuel consumption
      b) To reduce greenhouse gas emissions
      c) To replace all roads
      d) To increase traffic congestion
    answer_key: "b) To reduce greenhouse gas emissions"
    explanation: "These initiatives support environmental sustainability by reducing greenhouse gas emissions."
  assert:
    - type: llm-rubric
      value: >
        The validator is evaluating a correctly formed Reading Comprehension MCQ.
        The correct verdict is VALID — the answer is directly supported by the passage
        (which states electric buses and bicycle-sharing help reduce greenhouse gas
        emissions), there is exactly one correct option, and the question is
        answerable from the passage alone.
        Mark PASS if the output starts with VALID. Mark FAIL if it starts with INVALID.

