# ── Flawed Passage 4: The Importance of Coral Reefs ──────────────────────────

- vars:
    question_type: MCQ
    bloom_level: Understand
    difficulty: Easy
    course_outcome: CO1
    error_type: Incorrect Answer Key
    passage: |
      The Importance of Coral Reefs

      Coral reefs are among the most diverse ecosystems on Earth. Found in tropical and
      subtropical oceans, they provide habitat for thousands of marine species. Reefs also
      support fishing industries, protect coastlines from erosion, and contribute
      significantly to tourism in many countries.

      Despite their importance, coral reefs face numerous threats. Rising ocean temperatures
      can lead to coral bleaching, a process in which corals lose the algae that provide
      them with nutrients and color. Pollution, overfishing, and destructive coastal
      development can also damage reef ecosystems.

      Scientists, governments, and environmental organisations are working to protect coral
      reefs through conservation programs, marine protected areas, and public education
      initiatives. Long-term reef survival depends on both local conservation efforts and
      broader actions to address climate change.
    question: |
      Coral reefs are found primarily in:

      a) Tropical and subtropical oceans
      b) Mountain ranges
      c) Desert regions
      d) Arctic ice fields
    answer_key: "b) Mountain ranges"
    explanation: "The passage clearly states that coral reefs are found in tropical and subtropical oceans, not mountain ranges."
  assert:
    - type: llm-rubric
      value: >
        The validator is evaluating a FLAWED Reading Comprehension MCQ. Flaw: the answer
        key states b) Mountain ranges, but the passage explicitly says coral reefs are
        found in tropical and subtropical oceans — option a is the correct answer.
        The correct verdict is INVALID.
        Mark PASS if the output starts with INVALID. Mark FAIL if it starts with VALID.

