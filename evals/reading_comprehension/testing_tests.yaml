# ── Flawed Passage 5: The Expansion of Space Tourism ─────────────────────────

- vars:
    question_type: MCQ
    bloom_level: Understand
    difficulty: Easy
    course_outcome: CO1
    error_type: Incorrect Answer Key
    passage: |
      The Expansion of Space Tourism

      Space tourism is an emerging industry that aims to provide private individuals with
      opportunities to travel beyond Earth's atmosphere. Advances in aerospace technology
      and increased investment from private companies have contributed to the growth of
      this sector. Several organisations have already conducted commercial flights that
      allow passengers to experience brief periods of weightlessness and view Earth from
      space.

      Supporters of space tourism argue that it encourages innovation and inspires public
      interest in science and technology. The industry has also contributed to the
      development of reusable rocket systems designed to reduce launch costs. However,
      space tourism remains expensive, limiting participation to a relatively small number
      of customers.

      Environmental concerns have also been raised. Rocket launches require significant
      amounts of fuel and may contribute to atmospheric pollution. Researchers are studying
      ways to make future space travel more sustainable while maintaining safety standards.
      In addition, governments and international agencies continue to develop regulations
      to address legal and operational challenges associated with commercial spaceflight.

      Although the industry is still in its early stages, experts believe that technological
      improvements may gradually increase accessibility. Whether space tourism becomes a
      common form of travel or remains a niche activity will depend on factors such as
      cost, safety, environmental impact, and public demand.
    question: |
      What is the main purpose of space tourism?

      a) To transport cargo between countries
      b) To provide private individuals with opportunities to travel beyond Earth's atmosphere
      c) To replace commercial airlines completely
      d) To study marine ecosystems
    answer_key: "c) To replace commercial airlines completely"
    explanation: "The passage states the purpose is to provide private individuals opportunities to travel beyond Earth's atmosphere — option b is correct, not c."
  assert:
    - type: llm-rubric
      value: >
        The validator is evaluating a FLAWED Reading Comprehension MCQ. Flaw: the answer
        key states c) To replace commercial airlines, but the passage defines space
        tourism's purpose as providing private individuals opportunities to travel beyond
        Earth's atmosphere — option b is the correct answer. The correct verdict is INVALID.
        Mark PASS if the output starts with INVALID. Mark FAIL if it starts with VALID.

