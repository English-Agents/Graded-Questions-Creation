# NEGATIVE QUESTIONS — Flawed Reading Comprehension questions (should be marked INVALID)

# ── Flawed Passage 1: The Growth of Remote Work ──────────────────────────────

- vars:
    question_type: MCQ
    bloom_level: Understand
    difficulty: Easy
    course_outcome: CO1
    error_type: Multiple Correct Answers
    passage: |
      The Growth of Remote Work

      Remote work has become increasingly common in many industries over the past decade.
      Advances in communication technology, cloud computing, and collaboration software
      have made it possible for employees to perform their duties from locations outside
      traditional offices. While remote work was already growing steadily, global events
      in recent years accelerated its adoption across organizations of all sizes.

      One advantage of remote work is flexibility. Employees can often choose where they
      work and may spend less time commuting. This can improve work-life balance and reduce
      transportation costs. Employers may also benefit by accessing a wider talent pool
      because they are no longer limited to hiring people who live near a physical office.

      However, remote work presents challenges. Communication can sometimes become more
      difficult when team members are located in different time zones. Employees may
      experience feelings of isolation if they have limited social interaction with
      colleagues. In addition, maintaining cybersecurity and protecting sensitive company
      data require continuous attention.

      Many organizations have adopted hybrid work models that combine remote and in-office
      work. Supporters argue that hybrid arrangements provide flexibility while preserving
      opportunities for collaboration and team building. Researchers continue to study the
      long-term effects of remote work on productivity, employee satisfaction, and
      organisational culture.
    question: |
      Which of the following technologies helped enable remote work?

      a) Cloud computing
      b) Collaboration software
      c) Communication technology
      d) All of the above
    answer_key: "a) Cloud computing"
    explanation: "Options a, b, and c are all correct — all three technologies are mentioned in the passage."
  assert:
    - type: llm-rubric
      value: >
        The validator is evaluating a FLAWED Reading Comprehension MCQ. Flaw: the passage
        mentions all three technologies (communication technology, cloud computing, AND
        collaboration software), making options a, b, and c all correct — so option d
        is actually the right answer, not a. The question has multiple correct options.
        The correct verdict is INVALID.
        Mark PASS if the output starts with INVALID. Mark FAIL if it starts with VALID.

