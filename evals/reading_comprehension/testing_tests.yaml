# ── Flawed Passage 2: Citizen Science Projects ───────────────────────────────

- vars:
    question_type: MCQ
    bloom_level: Understand
    difficulty: Moderate
    course_outcome: CO1
    error_type: Information Not Present in Passage
    passage: |
      Citizen Science Projects

      Citizen science refers to scientific research that involves participation from members
      of the public. Rather than being conducted solely by professional scientists, many
      projects invite volunteers to collect data, make observations, or analyze information.
      These initiatives help researchers gather large amounts of data while increasing
      public engagement with science.

      Citizen science projects cover a wide range of fields. In environmental studies,
      volunteers may monitor bird populations, track weather patterns, or record changes
      in local ecosystems. In astronomy, participants help identify celestial objects by
      examining images collected from telescopes. Some health-related projects also
      encourage individuals to contribute information that supports medical research.

      Technology has played a major role in expanding citizen science. Mobile applications
      and online platforms allow participants to submit observations quickly and accurately.
      As a result, researchers can access information from many geographic regions that
      would otherwise be difficult to study.
    question: |
      What color are the mobile applications commonly used in citizen science projects?

      a) Blue
      b) Green
      c) Black
      d) White
    answer_key: "a) Blue"
    explanation: "The passage contains no information about the color of mobile applications."
  assert:
    - type: llm-rubric
      value: >
        The validator is evaluating a FLAWED Reading Comprehension MCQ. Flaw: the passage
        makes no mention of the color of any mobile applications — this detail is entirely
        absent from the text, making the question impossible to answer from the passage.
        The correct verdict is INVALID.
        Mark PASS if the output starts with INVALID. Mark FAIL if it starts with VALID.

