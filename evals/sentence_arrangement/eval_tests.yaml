# eval_tests.yaml — Sentence Arrangement
# 5 positive test cases: valid, well-formed sentence arrangement questions.

- description: "SA Easy CO1 — accountant submits reports scenario"
  vars:
    bloom_level: "K2"
    difficulty: "Easy"
    course_outcome: "CO1: Identify nouns and main verbs in sentence context."
    question_type: "Sentence Arrangement"
    question: |
      Instruction: Arrange the following parts to form a single meaningful sentence.

      (A) at the end of each month
      (B) submits financial reports
      (C) the accountant
      (D) to the directors
    solution: "C–B–D–A"
    explanation: |
      The correct order is: The accountant submits financial reports to the directors at the end of each month.
      (C) is the subject, (B) is the verb phrase, (D) is the indirect object, (A) is the time adverbial.
  assert:
    - type: llm-rubric
      value: >
        This is a VALID Sentence Arrangement question. The 4 parts (A–D) form exactly one
        grammatically correct sentence in order C–B–D–A. The validator must output VALID.
        Mark PASS if the validator responded VALID. Mark FAIL if it responded INVALID.

