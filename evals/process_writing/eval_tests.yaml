# POSITIVE QUESTIONS — Correctly formed Process Writing questions

- vars:
    question_type: Process Writing
    bloom_level: Create
    difficulty: "B2-C1"
    marks: 8
    course_outcome: "Describe a process clearly using logical sequence, appropriate linking words, passive voice where needed, and accurate procedural details."
    question: |
      Describe the process of preparing compost from kitchen waste in 120-150 words.

      Marks: 8

      Use the hints given below:

      Hints: collect vegetable peels and food scraps – separate plastic and metal waste – place organic waste in a compost bin – add dry leaves or soil – sprinkle water – turn the mixture regularly – wait for decomposition – use compost for plants
    sample_answer: |
      The Process of Preparing Compost

      Compost can be prepared at home by following a simple process. First, vegetable peels, fruit skins, and other food scraps are collected from the kitchen. Plastic, metal, and glass items are separated because they do not decompose. Next, the organic waste is placed in a compost bin. A layer of dry leaves or soil is added to reduce smell and support decomposition. After that, a little water is sprinkled to keep the mixture moist. The waste is turned regularly so that air can enter and the materials can break down properly. Over the next few weeks, the waste slowly decomposes into dark, rich compost. Finally, this compost is removed from the bin and used to improve the soil around plants.
    explanation: "This is a valid process writing question because it provides a clear topic, logical hints, word limit, and expected structure. The answer follows the process step by step using sequence connectors."
  assert:
    - type: llm-rubric
      value: >
        The validator is evaluating a correctly formed Process Writing question.
        The correct verdict is VALID — the answer uses every hint in the exact order given, stays within the word range, follows correct real-world sequencing, and matches the named process with no off-topic content.
        Mark PASS if the output starts with VALID. Mark FAIL if it starts with INVALID.

