      value: >
        The validator is evaluating a correctly formed Process Writing question.
        The correct verdict is VALID — the answer follows every hint in the exact listed order, remains within the word range, and describes a realistic, logically sequenced procedure matching the named task.
        Mark PASS if the output starts with VALID. Mark FAIL if it starts with INVALID.

- vars:
    question_type: Process Writing
    bloom_level: Create
    difficulty: "B2-C1"
    marks: 8
    course_outcome: "Write a clear process description using chronological order, connectors, and accurate explanation of each stage."
    question: |
      Describe the process of purifying water at home by boiling in 120-150 words.

      Marks: 8

      Use the hints given below:

      Hints: take clean vessel – filter visible dirt – pour water – heat until boiling – boil for several minutes – let it cool – store in covered container – use clean ladle or bottle
    sample_answer: |
      The Process of Purifying Water by Boiling

      Water can be purified at home by boiling it properly. First, a clean vessel is taken for the process. If the water contains visible dirt, it is filtered through a clean cloth before boiling. Then the water is poured into the vessel and placed on a stove. It is heated until it reaches a steady boil. The water should continue boiling for several minutes so that harmful germs are destroyed. After boiling, the vessel is removed from the stove and the water is allowed to cool naturally. Once it cools, the water is transferred into a clean, covered container. It should not be touched with unwashed hands. Finally, a clean ladle or bottle is used whenever the water is needed. This process makes water safer for drinking.
    explanation: "This is a well-formed process writing task because the hints guide students through a practical sequence while allowing full-sentence development and process vocabulary."
  assert:
    - type: llm-rubric
      value: >
        The validator is evaluating a correctly formed Process Writing question.
        The correct verdict is VALID — the answer follows every hint in correct chronological order, stays within the word range, and gives an accurate, coherent explanation of each stage of the named process.
        Mark PASS if the output starts with VALID. Mark FAIL if it starts with INVALID.

- vars:
