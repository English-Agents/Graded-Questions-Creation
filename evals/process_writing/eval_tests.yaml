    bloom_level: Create
    difficulty: "B2-C1"
    marks: 8
    course_outcome: "Describe a digital process clearly using step-by-step organization, relevant vocabulary, and concise explanation."
    question: |
      Describe the process of creating a strong password for an online account in 120-150 words.

      Marks: 8

      Use the hints given below:

      Hints: avoid personal information – choose longer password – mix uppercase and lowercase letters – add numbers and symbols – avoid common words – do not reuse old passwords – save securely – update regularly
    sample_answer: |
      The Process of Creating a Strong Password

      Creating a strong password is important for protecting an online account. First, personal information such as name, birth date, or phone number should be avoided because it can be guessed easily. Next, a longer password is chosen, preferably with at least twelve characters. Uppercase and lowercase letters are mixed to make it harder to break. Numbers and symbols are then added to increase security. Common words, simple patterns, and repeated characters should not be used. After that, the password must be different from passwords used for other accounts. It can be saved securely in a trusted password manager instead of being written in an unsafe place. Finally, the password should be updated regularly, especially if there is any security warning. This process helps keep personal information safe online.
    explanation: "This is a valid process writing question because it provides clear procedural hints and requires students to explain a modern, practical process in logical order."
  assert:
    - type: llm-rubric
      value: >
        The validator is evaluating a correctly formed Process Writing question.
