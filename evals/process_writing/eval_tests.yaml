    question: |
      Describe the process of applying for a library membership in 120-150 words.

      Marks: 8

      Use the hints given below:

      Hints: visit library office – collect application form – fill in personal details – attach identity proof and photograph – pay membership fee – submit form – receive membership card – borrow books
    sample_answer: |
      The Process of Applying for Library Membership

      Applying for a library membership involves a few simple steps. First, the applicant visits the library office during working hours. Then, an application form is collected from the librarian or the registration counter. The applicant fills in personal details such as name, address, contact number, and class or occupation. After that, a copy of identity proof and a recent photograph are attached to the form. The required membership fee is then paid at the counter. Next, the completed form and payment receipt are submitted for verification. Once the details are checked, the applicant receives a membership card. This card must be shown whenever books are borrowed or returned. Finally, the new member can use the library facilities and borrow books according to the rules.
    explanation: "This question is valid because the process is realistic, clearly sequenced, and suitable for B2-C1 learners. The sample answer uses formal process language and complete procedural details."
  assert:
