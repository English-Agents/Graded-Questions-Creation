# POSITIVE QUESTIONS — Correctly formed Jumbled Words questions

- vars:
    question_type: Jumbled Words
    bloom_level: K2 – Understand
    difficulty: Easy
    course_outcome: "CO1: Use the correct noun or main verb form of given base words according to sentence context."
    question: |
      Rearrange the jumbled words to form a meaningful sentence. Then identify the noun and the main verb in the sentence:

      engineer / the / machine / repaired / the
    solution: |
      The engineer repaired the machine.

      Noun: engineer, machine
      Main Verb: repaired
    explanation: "'Engineer' and 'machine' are naming words, so they are nouns. 'Repaired' shows the action performed in the sentence, so it is the main verb."
  assert:
    - type: llm-rubric
      value: >
        The validator is evaluating a correctly formed Jumbled Words question.
        The correct verdict is VALID — the jumbled words form one clear sentence,
        all nouns are identified, the main verb is correctly named, and the
        explanation is grammatically accurate.
        Mark PASS if the output starts with VALID. Mark FAIL if it starts with INVALID.

