# NEGATIVE QUESTIONS — Flawed Jumbled Words questions (should be marked INVALID)

- vars:
    question_type: Jumbled Words
    bloom_level: K2 – Understand
    difficulty: Easy
    course_outcome: "CO1: Use the correct noun or main verb form of given base words according to sentence context."
    question: |
      Rearrange the jumbled words to form a meaningful sentence. Then identify the noun and the main verb in the sentence:

      engineer / the / machine / repaired / the
    solution: |
      The engineer repaired the machine.

      Noun: repaired
      Main Verb: engineer
    explanation: "'Repaired' is a naming word, so it is a noun. 'Engineer' shows the action performed in the sentence, so it is the main verb."
    error_type: Swapped Noun and Main Verb
  assert:
    - type: llm-rubric
      value: >
        The validator is evaluating a FLAWED question. Flaw: noun and main verb are
        swapped — 'repaired' is a verb listed as a noun, 'engineer' is a noun listed
        as the main verb. The correct verdict is INVALID.
        Mark PASS if the output starts with INVALID. Mark FAIL if it starts with VALID.

