    bloom_level: "L2 – Understand"
    difficulty: "Easy"
    course_outcome: "CO1: Demonstrate comprehension of explicitly stated information in a reading passage."
    error_type: "Fabricated Detail"
    passage: |
      The old clock tower in Imran's town had stopped working years ago. People passed it daily without looking up. Some said repairing it would be useless because everyone now checked the time on mobile phones. However, Imran's grandfather told him that the clock tower was once the centre of the town. People met there before festivals, announcements were made nearby, and travellers used it as a landmark.

      Imran decided to learn more about the tower. He interviewed elderly residents and collected old photographs from families in the neighbourhood. With help from his history teacher, he prepared a small exhibition at school titled "The Clock That Remembered Us." Students were surprised to see how many memories were connected to a structure they had ignored.

      The exhibition attracted local attention. A few shopkeepers offered to contribute money for repairs, and the town council agreed to inspect the tower. Imran realised that preserving history was not only about protecting old buildings. It was also about helping people remember the stories that gave those buildings meaning.
