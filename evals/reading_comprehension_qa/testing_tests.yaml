# ── Flawed Passage: Saving Electricity at School ──────────────────────────────────

- vars:
    question_type: Literal
    bloom_level: "L2 – Understand"
    difficulty: "Easy"
    course_outcome: "CO1: Demonstrate comprehension of explicitly stated information in a reading passage."
    error_type: "False Premise"
    passage: |
      Dev noticed that many students in his school forgot to switch off fans and lights after leaving classrooms. The electricity bill had increased, and teachers often reminded students to save power. Still, the problem continued because everyone assumed someone else would turn the switches off.

      Dev decided to begin with his own classroom. He made a small checklist and placed it near the door. Before leaving for the playground, library, or assembly, one student had to check whether the lights and fans were switched off. Dev also created colourful labels near the switches that said, "Use only when needed."

      During the first few days, students forgot the checklist several times. Dev did not complain. Instead, he suggested assigning weekly energy monitors. Slowly, the habit improved. Students began reminding one another before leaving the room. Some even started checking taps and classroom windows.

      After two weeks, the science teacher praised the class for taking responsibility. Other classrooms copied the checklist idea. Dev understood that saving electricity did not require a big invention. It required attention, teamwork, and the willingness to change small daily habits.
    question: |
      Why did Dev increase the school's electricity bill?
    answer_key: "Dev increased the bill by switching on all the fans and lights every day."
    explanation: |
      The passage says the electricity bill had increased because students forgot to switch off fans and lights. It does not say Dev caused the increase.
  assert:
    - type: llm-rubric
      value: >
        The validator is evaluating a FLAWED Reading Comprehension Q&A item (Literal). Flaw:
        the passage attributes the rising bill to students forgetting to switch off devices in general, not to any action by Dev — the question's premise is false. The correct verdict is INVALID.
