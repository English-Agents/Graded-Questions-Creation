# NEGATIVE QUESTIONS — Flawed Reading Comprehension Q&A items (should be marked INVALID)
# 5 passages x 4 sub-questions each = 20 total

# ── Flawed Passage: No-Waste Lunch Week ──────────────────────────────────

- vars:
    question_type: Literal
    bloom_level: "L2 – Understand"
    difficulty: "Easy"
    course_outcome: "CO1: Demonstrate comprehension of explicitly stated information in a reading passage."
    error_type: "False Premise"
    passage: |
      Tara's school started a "No-Waste Lunch Week" to encourage students to reduce food waste. At first, many students treated it like a temporary rule rather than a meaningful activity. They still threw away half-eaten sandwiches, fruit peels, and unopened snack packets. Tara noticed that most students were not wasting food intentionally; they were simply bringing more than they could eat.

      Instead of scolding her classmates, Tara created a lunch chart. She asked students to write down what they brought, what they finished, and what they usually wasted. After three days, the class discovered a pattern: many students packed too many snacks, while others disliked certain foods but carried them every day.

      Tara suggested a "share basket" where students could place unopened food items for anyone who wanted them. She also encouraged classmates to speak to their parents about packing smaller portions. By Friday, the dustbin near the classroom was less full than usual. The teacher praised the class, not because they had achieved perfection, but because they had learned to notice their habits and make thoughtful changes.
    question: |
      Why did Tara scold and punish her classmates during No-Waste Lunch Week?
    answer_key: "Tara scolded and punished them because they wasted food intentionally."
    explanation: |
      The passage says Tara did not scold her classmates. It also says students were not wasting food intentionally.
  assert:
    - type: llm-rubric
      value: >
        The validator is evaluating a FLAWED Reading Comprehension Q&A item (Literal). Flaw:
        the passage explicitly states Tara did not scold her classmates and that the waste was unintentional — the question's premise contradicts the text. The correct verdict is INVALID.
        Mark PASS if the output starts with INVALID. Mark FAIL if it starts with VALID.

