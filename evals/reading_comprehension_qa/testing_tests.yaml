# ── Flawed Passage: The Quiet Reading Corner ──────────────────────────────────

- vars:
    question_type: Literal
    bloom_level: "L2 – Understand"
    difficulty: "Easy"
    course_outcome: "CO1: Demonstrate comprehension of explicitly stated information in a reading passage."
    error_type: "Fabricated Detail"
    passage: |
      Kavya's class decided to start a "Quiet Reading Corner" in an unused part of the corridor. The space had an old noticeboard, two broken chairs, and a dusty shelf. Most students walked past it without noticing it. Kavya, however, thought it could become a peaceful place for students who wanted to read during short breaks.

      She asked her classmates to bring old magazines, storybooks, and newspapers from home. Some students brought cushions, while others helped clean the shelf and decorate the noticeboard with paper flowers. Their English teacher allowed them to display short book recommendations written by students.

      At first, only a few children used the corner. Gradually, more students began stopping there before assembly and during lunch. Some read silently, while others discussed stories softly. The corridor, once ignored, became a pleasant space where students shared books and ideas.

      By the end of the month, the principal appreciated the effort and asked other classes to create similar reading spaces. Kavya felt happy because the project showed that even a small unused area could become meaningful when students worked together with care and imagination.
    question: |
      Why did Kavya close the school library permanently?
    answer_key: "Kavya closed the library because students preferred reading in the corridor."
    explanation: |
      The passage does not mention Kavya closing the library. It only says she helped create a reading corner in an unused corridor space.
  assert:
    - type: llm-rubric
      value: >
        The validator is evaluating a FLAWED Reading Comprehension Q&A item (Literal). Flaw:
