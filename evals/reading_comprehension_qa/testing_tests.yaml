# ── Flawed Passage: Cleaning the Public Park ──────────────────────────────────

- vars:
    question_type: Literal
    bloom_level: "L2 – Understand"
    difficulty: "Easy"
    course_outcome: "CO1: Demonstrate comprehension of explicitly stated information in a reading passage."
    error_type: "Fabricated Detail"
    passage: |
      Sara lived near a small public park that had lost its charm. The grass had dry patches, the swings creaked, and visitors often left plastic wrappers near the benches. Many families stopped coming in the evenings because the park looked neglected.

      One Saturday, Sara and her friends decided to clean the park. They wore gloves, collected litter, and placed separate bags for plastic and paper waste. Sara also requested the nearby shopkeeper to keep a dustbin outside his shop so that visitors would not throw wrappers on the ground.

      Their effort attracted attention. A few morning walkers joined them the next weekend. One of them knew a carpenter who repaired the broken swing at a low cost. Another resident brought paint for the benches. Children painted small signs that said, "Keep Our Park Clean."

      Within a month, the park began to look welcoming again. Families returned in the evenings, children played safely, and visitors became more careful with their waste. Sara realised that public spaces remain beautiful only when the people who use them also take responsibility for them.
    question: |
      Why did Sara ask visitors to stop coming to the park?
    answer_key: "Sara asked visitors to stop coming because she wanted the park for herself."
    explanation: |
      The passage does not say Sara asked visitors to stop coming. She helped clean the park so families could return.
  assert:
    - type: llm-rubric
      value: >
        The validator is evaluating a FLAWED Reading Comprehension Q&A item (Literal). Flaw:
        the passage states Sara's actions were aimed at bringing families back to the park, not at keeping visitors away — this detail is invented. The correct verdict is INVALID.
        Mark PASS if the output starts with INVALID. Mark FAIL if it starts with VALID.

