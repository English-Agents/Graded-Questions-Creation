# POSITIVE QUESTIONS — Correctly formed Sentence Conversion questions

- vars:
    question_type: Sentence Conversion
    bloom_level: L2 – Understand
    difficulty: Easy
    course_outcome: "CO1: Use the correct noun or main verb form of given base words according to sentence context."
    question: |
      Write one grammatically correct sentence using 'paint' as a noun and one grammatically correct sentence using it as a verb. Ensure that the meaning clearly changes between the two sentences.
    solution: |
      1. The paint on the fence has faded.
      2. The workers will paint the fence tomorrow.
    explanation: "In the first sentence, 'paint' refers to a substance, so it functions as a noun. In the second sentence, 'paint' expresses an action, so it functions as a verb."
  assert:
    - type: llm-rubric
      value: >
        The validator is evaluating a correctly formed Sentence Conversion question.
        The correct verdict is VALID — the noun sentence uses 'paint' as a substance (noun),
        the verb sentence uses 'paint' as an action (verb), meanings differ, both sentences
        are grammatically correct, and the explanation is accurate.
        Mark PASS if the output starts with VALID. Mark FAIL if it starts with INVALID.

