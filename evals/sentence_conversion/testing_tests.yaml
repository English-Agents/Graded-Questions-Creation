- vars:
    question_type: Sentence Conversion
    bloom_level: L3 – Apply
    difficulty: Medium
    course_outcome: "CO1: Use the correct noun or main verb form of given base words according to sentence context."
    question: |
      Write one grammatically correct sentence using 'call' as a noun and one grammatically correct sentence using it as a verb. Ensure that the meaning clearly changes between the two sentences.
    solution: |
