      value: >
        The validator is evaluating a FLAWED Sentence Conversion question. Flaw: both
        sentences use 'drink' as a verb — the required noun usage (e.g., 'a refreshing
        drink') is completely absent. The correct verdict is INVALID.
        Mark PASS if the output starts with INVALID. Mark FAIL if it starts with VALID.

