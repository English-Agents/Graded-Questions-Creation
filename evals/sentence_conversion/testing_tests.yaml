    - type: llm-rubric
      value: >
        The validator is evaluating a FLAWED Sentence Conversion question. Flaw: both
        sentences use 'call' as a noun — 'made a call' is still a noun usage, not the
        verb form (e.g., 'Please call me'). The correct verdict is INVALID.
        Mark PASS if the output starts with INVALID. Mark FAIL if it starts with VALID.

- vars:
    question_type: Sentence Conversion
    bloom_level: L4 – Analyse
    difficulty: Hard
    course_outcome: "CO1: Use the correct noun or main verb form of given base words according to sentence context."
    question: |
      Write one grammatically correct sentence using 'paint' as a noun and one grammatically correct sentence using it as a verb. Ensure that the meaning clearly changes between the two sentences.
    solution: |
      1. The paint on the wall is bright and colorful.
      2. The artist paint beautiful landscapes every month.
    explanation: "The second sentence attempts to use 'paint' as a verb but contains a subject-verb agreement error. The correct form should be 'paints'."
    error_type: Additional Grammar Error in Verb Usage
  assert:
    - type: llm-rubric
      value: >
        The validator is evaluating a FLAWED Sentence Conversion question. Flaw: sentence 2
        has a subject-verb agreement error — 'The artist paint' should be 'The artist paints'.
        A grammatically incorrect sentence makes the response invalid. The correct verdict is INVALID.
        Mark PASS if the output starts with INVALID. Mark FAIL if it starts with VALID.
