# NEGATIVE QUESTIONS — Flawed Sentence Conversion questions (should be marked INVALID)

- vars:
    question_type: Sentence Conversion
    bloom_level: L2 – Understand
    difficulty: Easy
    course_outcome: "CO1: Use the correct noun or main verb form of given base words according to sentence context."
    question: |
      Write one grammatically correct sentence using 'play' as a noun and one grammatically correct sentence using it as a verb. Ensure that the meaning clearly changes between the two sentences.
    solution: |
      1. The children play in the park every evening.
      2. The actors performed a play on stage.
    explanation: "The answers are given in reverse order. The first sentence uses 'play' as a verb instead of a noun, while the second sentence uses it as a noun instead of a verb."
    error_type: Reversed Noun–Verb Usage
  assert:
    - type: llm-rubric
      value: >
        The validator is evaluating a FLAWED Sentence Conversion question. Flaw: the noun
        and verb sentences are in reverse order — sentence 1 uses 'play' as a verb and
        sentence 2 uses it as a noun, contradicting the instruction (noun first, then verb).
        The correct verdict is INVALID.
        Mark PASS if the output starts with INVALID. Mark FAIL if it starts with VALID.

