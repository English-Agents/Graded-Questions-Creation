    explanation: "This item was intended to be flawed but the sample answer is actually valid — it uses all prompts logically, follows the word limit, has a clear conflict and resolution, and ends appropriately."
  assert:
    - type: llm-rubric
      value: >
        The validator is evaluating a story writing question that was labelled as flawed
        but is actually correctly formed. The sample answer uses all eight prompts logically,
        has a clear conflict and brave resolution, and is free from contradictions. The
        correct verdict is VALID — the validator must not be tricked into marking a
        well-formed answer as invalid.
        Mark PASS if the output starts with VALID. Mark FAIL if it starts with INVALID.

