# NEGATIVE QUESTIONS — Flawed Guided Story Writing questions (should be marked INVALID)
# Exception: case 4 has no flaw — the validator should correctly return VALID.

- vars:
    question_type: Guided Story Writing
    bloom_level: Create
    difficulty: B2-C1
    marks: 8
    error_type: Missing prompts / unrelated development
    course_outcome: "Develop a coherent story using guided prompts, logical sequencing, descriptive language, and an appropriate conclusion."
    question: |
      Write a story in 150-180 words using the given prompts.

      Marks: 8

      Prompts: rainy night / power cut / strange sound / old neighbour / locked room / missing photograph / sudden discovery / happy ending
    sample_answer: |
      It was a rainy night when Aarav sat alone in his room, reading a comic book. Suddenly, the lights went out. He heard a strange sound from the kitchen and felt frightened. His old neighbour came to check on him and told him not to worry. Aarav then went to school the next day and won a prize in a painting competition. Everyone clapped for him, and he felt very proud. His parents took him out for dinner, and the day ended happily.
    explanation: "The sample answer begins with the given situation but ignores major prompts such as the locked room, missing photograph, and sudden discovery. The story shifts suddenly to an unrelated school event."
  assert:
    - type: llm-rubric
      value: >
        The validator is evaluating a FLAWED Guided Story Writing question. Flaw: the sample
        answer uses only 3 of the 8 prompts (rainy night, power cut, old neighbour) and then
        jumps to a completely unrelated school event, ignoring the locked room, missing
        photograph, and sudden discovery entirely. The correct verdict is INVALID.
        Mark PASS if the output starts with INVALID. Mark FAIL if it starts with VALID.

