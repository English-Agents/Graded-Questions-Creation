- vars:
    question_type: Guided Story Writing
    bloom_level: Create
    difficulty: C1
    marks: 8
    error_type: Contradictory plot
    course_outcome: "Produce a coherent and engaging story using setting, conflict, suspense, and resolution."
    question: |
      Write a story in 150-180 words using the given prompts.

      Marks: 8

      Prompts: lonely railway station / midnight / unattended suitcase / police announcement / frightened passenger / hidden letter / family secret / unexpected reunion
    sample_answer: |
      At midnight, a lonely railway station was silent except for the sound of a distant train. A frightened passenger noticed an unattended suitcase near a bench. The police announcement warned everyone not to touch suspicious luggage. However, the passenger opened it and found a hidden letter. The letter revealed a family secret about a brother who had disappeared years ago. Suddenly, the suitcase exploded, and everyone ran in fear. A few minutes later, the missing brother arrived safely and hugged the passenger. It was an emotional reunion.
    explanation: "The story has a serious logical contradiction. If the suitcase exploded, the later peaceful reunion happens without explanation. The ending does not resolve the danger or explain how the characters remained safe."
  assert:
    - type: llm-rubric
      value: >
        The validator is evaluating a FLAWED Guided Story Writing question. Flaw: the plot
        is internally contradictory — the suitcase explodes, yet a calm emotional reunion
        follows moments later with no explanation of how anyone survived unharmed. A
        logically inconsistent plot cannot serve as a valid sample answer. The correct
        verdict is INVALID.
        Mark PASS if the output starts with INVALID. Mark FAIL if it starts with VALID.

