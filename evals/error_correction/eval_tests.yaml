# eval_tests.yaml — Error Correction
# 5 positive reference questions (Q1-Q5). Q6-Q10 reserved.

- description: "EC L3 Medium CO1 — manager quarterly report scenario"
  vars:
    bloom_level: "L3"
    difficulty: "Medium"
    course_outcome: "CO1: Identify and correct errors in the use of nouns and main verbs based on sentence context."
    question_type: "Error Correction"
    question: |
      Instruction: Identify the incorrect words in the sentence and replace them with the correct forms.

      After the manager's detailed reviewed of the quarterly report, the finance team approval the revised budget.
    solution: |
      Incorrect words: reviewed, approval
      Correct words: review, approved

      Correct sentence: After the manager's detailed review of the quarterly report, the finance team approved the revised budget.
    explanation: |
      Review is required because it follows the adjective "detailed" and functions as a noun.
      Approved is required because "the finance team" needs a main verb to show the action.
  assert:
    - type: llm-rubric
      value: >
        The Error Correction question must contain exactly two incorrect words — one noun used where a verb
        is required and one verb used where a noun is required. The solution must identify both incorrect
        words, provide the correct replacements, and rewrite the full corrected sentence. The explanation
        must justify each correction using grammatical reasoning such as "follows the adjective" or
        "needs a main verb."

