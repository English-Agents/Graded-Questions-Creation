# NEGATIVE QUESTIONS — Intentionally flawed Sentence Correction / MCQ questions

- vars:
    question_type: Sentence Correction / MCQ
    bloom_level: L4
    difficulty: Hard
    course_outcome: "CO1: Evaluate whether a sentence-correction MCQ has one clear grammatically correct option."
    question: |
      Instruction: Choose the grammatically correct version of the sentence given below.

      Incorrect sentence: The principal's careful observe of classroom behaviour helped improve the teaching plan.

      i) The principal's careful observation of classroom behaviour helped improve the teaching plan.
      ii) The principal's careful observing of classroom behaviour helped improve the teaching plan.
      iii) The principal's careful study of classroom behaviour helped improve the teaching plan.
      iv) The principal's careful review of classroom behaviour helped improve the teaching plan.
    flawed_solution: "Possible correct options: i), iii), and iv)"
    explanation: "Flawed because options i, iii, and iv are all grammatically correct — observation, study, and review are all valid nouns after 'careful.' There is no single correct answer."
    error_type: More than one correct answer
  assert:
    - type: llm-rubric
      value: "The Sentence Correction / MCQ must: (1) present an incorrect sentence with a noun-vs-main-verb error, (2) give exactly 4 options (i–iv), (3) have exactly ONE grammatically correct option fixing the noun or main verb form, (4) have three distractors using wrong forms, (5) provide an accurate answer key. Respond: VALID or INVALID."

