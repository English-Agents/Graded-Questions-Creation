      Instruction: Choose the grammatically correct version of the sentence given below.

      Incorrect sentence: The auditor prepared a detailed summarize of the expense records.

      i) The auditor prepared a detailed summary of the expense records.
      ii) The auditor prepared a detailed summarized of the expense records.
      iii) The auditor prepared a detailed summarizes of the expense records.
