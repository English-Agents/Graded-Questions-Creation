      Instruction: Choose the grammatically correct version of the sentence given below.

      Incorrect sentence: The mechanic inspection the engine before replacing the damaged part.

      i) The mechanic inspecting the engine before replacing the damaged part.
      ii) The mechanic inspection the engine before replacing the damaged part.
      iii) The mechanic inspect the engine before replacing the damaged part.
      iv) The mechanic inspects engine before replacing the damaged part.
    flawed_solution: "No correct option"
    explanation: "Flawed because none of the four options provides a correct finite main verb (inspected). Option iv also has an article error ('inspects engine'). The question has no valid correct answer."
    error_type: No correct answer
  assert:
    - type: llm-rubric
      value: "The Sentence Correction / MCQ must: (1) present an incorrect sentence with a noun-vs-main-verb error, (2) give exactly 4 options (i–iv), (3) have exactly ONE grammatically correct option fixing the noun or main verb form, (4) have three distractors using wrong forms, (5) provide an accurate answer key. Respond: VALID or INVALID."

