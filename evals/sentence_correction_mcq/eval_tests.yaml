# POSITIVE QUESTIONS — Correctly formed Sentence Correction / MCQ questions

- vars:
    question_type: Sentence Correction / MCQ
    bloom_level: L3
    difficulty: Medium
    course_outcome: "CO1: Identify and correct errors in noun and main verb forms based on sentence context."
    question: |
      Instruction: Choose the grammatically correct version of the sentence given below.

      Incorrect sentence: After the supervisor's detailed inspect of the machinery, the technician repaired the damaged motor.

      i) After the supervisor's detailed inspection of the machinery, the technician repaired the damaged motor.
      ii) After the supervisor's detailed inspected of the machinery, the technician repaired the damaged motor.
      iii) After the supervisor's detailed inspecting of the machinery, the technician repaired the damaged motor.
      iv) After the supervisor's detailed inspects of the machinery, the technician repaired the damaged motor.
    solution: "i) After the supervisor's detailed inspection of the machinery, the technician repaired the damaged motor."
    explanation: "Option i is correct because inspection is the noun form required after the adjective 'detailed.' The other options use verb forms that do not fit the noun position in the sentence."
  assert:
    - type: llm-rubric
      value: "The Sentence Correction / MCQ must: (1) present an incorrect sentence with a noun-vs-main-verb error, (2) give exactly 4 options (i–iv), (3) have exactly ONE grammatically correct option fixing the noun or main verb form, (4) have three distractors using wrong forms, (5) provide an accurate answer key. Respond: VALID or INVALID."

