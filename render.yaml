services:
  - type: web
    name: ga-question-generator
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      cd frontend && npm install && npm run build
    startCommand: uvicorn backend.api_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false          # set manually in Render dashboard — never committed
      - key: PYTHON_VERSION
        value: "3.11"
